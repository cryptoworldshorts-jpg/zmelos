<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Melos | Official Artist Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050a15; color: white; }
        .neon-border { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); border: 1px solid rgba(59, 130, 246, 0.5); }
        .neon-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.8); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <section class="min-h-screen flex flex-col items-center justify-center px-6 py-20 text-center">
        <div class="relative mb-8">
            <div class="absolute inset-0 rounded-full bg-blue-500 blur-3xl opacity-20 animate-pulse"></div>
            <img src="https://i.postimg.cc/T2BJ88dD/zmelos.jpg" alt="Z-Melos Logo" class="w-64 h-64 md:w-80 md:h-80 object-contain relative z-10">
        </div>
        
        <h1 class="text-4xl md:text-6xl font-bold italic neon-text mb-4 uppercase tracking-tighter">Z-Melos</h1>
        <p class="text-gray-400 max-w-lg mx-auto mb-10 italic">Otkrijte novi zvuk tradicije i moderne muzike. Pratite Z-Melos na svim streaming platformama.</p>
        
        <div class="flex flex-wrap justify-center gap-6 mb-16">
            <a href="#" class="glass p-4 rounded-2xl hover:scale-110 transition neon-border group">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174872.png" class="w-8 h-8 opacity-70 group-hover:opacity-100" alt="Spotify">
            </a>
            <a href="#" class="glass p-4 rounded-2xl hover:scale-110 transition neon-border group">
                <img src="https://cdn-icons-png.flaticon.com/512/732/732183.png" class="w-8 h-8 opacity-70 group-hover:opacity-100" alt="Apple Music">
            </a>
            <a href="#" class="glass p-4 rounded-2xl hover:scale-110 transition neon-border group">
                <img src="https://cdn-icons-png.flaticon.com/512/5969/5969152.png" class="w-8 h-8 opacity-70 group-hover:opacity-100" alt="Amazon Music">
            </a>
        </div>
    </section>

    <section class="max-w-6xl mx-auto px-6 py-20">
        <h2 class="text-3xl font-bold italic mb-12 border-l-4 border-blue-500 pl-4 uppercase">Video Spotovi</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="neon-border rounded-xl overflow-hidden">
                <iframe class="w-full aspect-video" src="https://www.youtube.com/embed/VIDEO_ID_1" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="neon-border rounded-xl overflow-hidden">
                <iframe class="w-full aspect-video" src="https://www.youtube.com/embed/VIDEO_ID_2" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <footer class="py-10 border-t border-white/10 text-center text-gray-500 text-sm">
        <p>&copy; 2026 Z-Melos. Sva prava zadržana. Designed by Sanel.</p>
    </footer>

</body>
</html>
